<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajiv Computers | Premium Tech Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        
        /* Smooth Animations */
        .hover-card { transition: all 0.3s ease; }
        .hover-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px -10px rgba(37,99,235,0.3); border-color: rgba(59,130,246,0.5); }
        .product-image { transition: transform 0.5s ease; }
        .hover-card:hover .product-image { transform: scale(1.1); }
        
        /* Cart Sidebar Animation */
        #cart-sidebar { transition: transform 0.4s ease; }
        .cart-open { transform: translateX(0); }
        .cart-closed { transform: translateX(100%); }
        #overlay { transition: opacity 0.3s ease; }
        .overlay-open { opacity: 1; pointer-events: auto; }
        .overlay-closed { opacity: 0; pointer-events: none; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#09090b] text-zinc-100 selection:bg-blue-600 selection:text-white">

    <!-- 1. NAVBAR -->
    <nav class="bg-[#09090b]/90 backdrop-blur-xl sticky top-0 z-40 border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer">
                <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="ph-fill ph-cpu text-xl"></i></div>
                <div>
                    <h1 class="text-xl font-black tracking-tight text-white">RAJIV</h1>
                    <span class="text-blue-500 text-[10px] font-black tracking-widest uppercase">Computers</span>
                </div>
            </div>

            <!-- Working Search Bar -->
            <div class="hidden md:flex flex-1 max-w-md mx-8 bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-2 focus-within:border-blue-500">
                <i class="ph ph-magnifying-glass text-zinc-400 mt-1 mr-2"></i>
                <input type="text" id="search-input" onkeyup="searchProducts()" placeholder="Search laptops, chargers, hubs..." class="w-full bg-transparent border-none outline-none text-sm text-zinc-200">
            </div>

            <button onclick="toggleCart()" class="relative bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-lg flex items-center gap-2 hover:border-blue-500 transition-colors">
                <i class="ph-bold ph-shopping-cart text-zinc-300"></i>
                <span class="text-sm font-bold hidden sm:block">Cart</span>
                <span id="cart-counter" class="absolute -top-2 -right-2 bg-blue-600 text-white text-xs font-bold h-5 w-5 rounded-full flex items-center justify-center">0</span>
            </button>
        </div>
    </nav>

    <!-- 2. WORKING CATEGORY FILTERS -->
    <div class="max-w-7xl mx-auto px-4 mt-8 mb-6 overflow-x-auto whitespace-nowrap scrollbar-hide py-2 flex gap-3">
        <button onclick="filterCategory('All')" class="filter-btn active-filter bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-bold shadow-lg shadow-blue-600/20">🔥 All Products</button>
        <button onclick="filterCategory('Laptops')" class="filter-btn bg-zinc-900 border border-zinc-800 text-zinc-300 hover:text-white px-5 py-2 rounded-full text-sm font-bold transition">💻 Laptops</button>
        <button onclick="filterCategory('Chargers')" class="filter-btn bg-zinc-900 border border-zinc-800 text-zinc-300 hover:text-white px-5 py-2 rounded-full text-sm font-bold transition">🔌 Chargers</button>
        <button onclick="filterCategory('Hubs')" class="filter-btn bg-zinc-900 border border-zinc-800 text-zinc-300 hover:text-white px-5 py-2 rounded-full text-sm font-bold transition">🎛️ USB Hubs</button>
        <button onclick="filterCategory('Cables')" class="filter-btn bg-zinc-900 border border-zinc-800 text-zinc-300 hover:text-white px-5 py-2 rounded-full text-sm font-bold transition">⚡ Cables</button>
    </div>

    <!-- 3. DYNAMIC PRODUCT GRID -->
    <section class="max-w-7xl mx-auto px-4 mb-20">
        <!-- Products will be injected here automatically by JavaScript -->
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        
        <!-- Empty State for Search -->
        <div id="no-results" class="hidden text-center py-20 text-zinc-500">
            <i class="ph-light ph-magnifying-glass text-6xl mb-4 opacity-20"></i>
            <h3 class="text-xl font-bold text-white mb-2">No products found</h3>
            <p>Try searching for something else like "MacBook" or "Anker"</p>
        </div>
    </section>

    <!-- 4. SLIDE-OUT CART (Same as before but smarter) -->
    <div id="overlay" onclick="toggleCart()" class="overlay-closed fixed inset-0 bg-black/80 backdrop-blur-sm z-50"></div>

    <div id="cart-sidebar" class="cart-closed fixed top-0 right-0 h-full w-full sm:w-[400px] bg-[#0c0c0e] border-l border-zinc-800 z-50 flex flex-col">
        <div class="px-6 py-5 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50">
            <h2 class="text-xl font-bold flex items-center gap-2 text-white">Your Cart</h2>
            <button onclick="toggleCart()" class="text-zinc-400 hover:text-white bg-zinc-800 p-2 rounded-full transition"><i class="ph-bold ph-x"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4">
            <div id="empty-cart-msg" class="text-center text-zinc-500 mt-20"><p>Your cart is empty.</p></div>
        </div>
        <div class="border-t border-zinc-800 p-6 bg-[#09090b]">
            <div class="flex justify-between text-white font-black text-2xl mb-6">
                <span>Total</span>
                <span id="cart-total" class="text-blue-500">₹0</span>
            </div>
            <button class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-600/20">Proceed to Checkout</button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- THE JAVASCRIPT DATABASE & LOGIC -->
    <!-- ========================================== -->
    <script>
        // 🚀 THE PRODUCT DATABASE (Easy to edit and update!)
        const database = [
            // --- LAPTOPS ---
            { id: 1, name: "ASUS ROG Zephyrus G14", category: "Laptops", price: 129990, oldPrice: 145990, badge: "HOT", img: "https://images.unsplash.com/photo-1603302576837-37561b2e2302?auto=format&fit=crop&w=600&q=80", specs: "Ryzen 9 | RTX 4060 | 16GB" },
            { id: 2, name: "Apple MacBook Air M3", category: "Laptops", price: 114900, oldPrice: 119900, badge: "NEW", img: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&w=600&q=80", specs: "M3 Chip | 8GB RAM | 256GB" },
            { id: 3, name: "Lenovo Legion Pro 5i", category: "Laptops", price: 145000, oldPrice: null, badge: "", img: "https://images.unsplash.com/photo-1593640408182-31c70c8268f5?auto=format&fit=crop&w=600&q=80", specs: "Intel i7 13th Gen | RTX 4070" },
            { id: 4, name: "Acer Nitro V Gaming", category: "Laptops", price: 74990, oldPrice: 89990, badge: "-15%", img: "https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?auto=format&fit=crop&w=600&q=80", specs: "Intel i5 13th Gen | RTX 4050" },
            { id: 5, name: "HP Victus 15", category: "Laptops", price: 58990, oldPrice: 65990, badge: "BUDGET", img: "https://images.unsplash.com/photo-1629131726692-1accd0c53ce0?auto=format&fit=crop&w=600&q=80", specs: "Ryzen 5 | GTX 1650 | 8GB" },
            
            // --- CHARGERS ---
            { id: 6, name: "Anker 735 GaNPrime 65W", category: "Chargers", price: 4999, oldPrice: 5999, badge: "BEST", img: "https://images.unsplash.com/photo-1583863788434-e58a36330cf0?auto=format&fit=crop&w=600&q=80", specs: "3 Ports | Fast Charge | GaN" },
            { id: 7, name: "Apple 35W Dual USB-C", category: "Chargers", price: 5800, oldPrice: null, badge: "ORIGINAL", img: "https://images.unsplash.com/photo-1620058269781-64d603e87c04?auto=format&fit=crop&w=600&q=80", specs: "Dual Port | Compact Design" },
            { id: 8, name: "CMF by Nothing 65W", category: "Chargers", price: 2999, oldPrice: 3499, badge: "", img: "https://images.unsplash.com/photo-1615526675159-e248c3021d3f?auto=format&fit=crop&w=600&q=80", specs: "GaN Tech | 2 Type-C, 1 USB-A" },
            { id: 9, name: "UGREEN 100W Nexode", category: "Chargers", price: 7999, oldPrice: null, badge: "PRO", img: "https://images.unsplash.com/photo-1585338107529-13afc5f02586?auto=format&fit=crop&w=600&q=80", specs: "MacBook Pro Ready | 4 Ports" },
            
            // --- HUBS ---
            { id: 10, name: "Satechi Type-C Multi-Port", category: "Hubs", price: 7499, oldPrice: 8999, badge: "PREMIUM", img: "https://images.unsplash.com/photo-1616410011236-7a42121dd981?auto=format&fit=crop&w=600&q=80", specs: "4K HDMI | Ethernet | SD Card" },
            { id: 11, name: "Baseus 7-in-1 Type-C Hub", category: "Hubs", price: 2499, oldPrice: 3199, badge: "VALUE", img: "https://images.unsplash.com/photo-1592434689456-f94da9cde15d?auto=format&fit=crop&w=600&q=80", specs: "100W PD | HDMI | 2x USB 3.0" },
            { id: 12, name: "Anker PowerExpand 8-in-1", category: "Hubs", price: 5999, oldPrice: null, badge: "", img: "https://images.unsplash.com/photo-1544228898-100db60b0e35?auto=format&fit=crop&w=600&q=80", specs: "Dual HDMI | 10Gbps Data" },
            
            // --- CABLES ---
            { id: 13, name: "Apple Thunderbolt 4 Pro", category: "Cables", price: 6900, oldPrice: null, badge: "APPLE", img: "https://images.unsplash.com/photo-1538368142340-97c7d4fc28e3?auto=format&fit=crop&w=600&q=80", specs: "1.8 Meter | 40Gbps Speed" },
            { id: 14, name: "Baseus 100W Display Cable", category: "Cables", price: 999, oldPrice: 1499, badge: "TECH", img: "https://images.unsplash.com/photo-1612815154858-60aa4c59eaa6?auto=format&fit=crop&w=600&q=80", specs: "Digital LED Display | Braided" },
            { id: 15, name: "Belkin Braided Type-C to C", category: "Cables", price: 1499, oldPrice: null, badge: "", img: "https://images.unsplash.com/photo-1516724562728-afc824a36e84?auto=format&fit=crop&w=600&q=80", specs: "Super Durable | 2 Meters" }
        ];

        let cart = [];
        let currentFilter = 'All';

        // 1. Function to format price (e.g. ₹1,29,990)
        const formatMoney = (amount) => '₹' + amount.toLocaleString('en-IN');

        // 2. Function to Render (Show) Products on Screen
        function renderProducts(productsToDisplay) {
            const grid = document.getElementById('product-grid');
            const noResults = document.getElementById('no-results');
            
            grid.innerHTML = ''; // Clear old products

            if(productsToDisplay.length === 0) {
                noResults.style.display = 'block';
                return;
            } else {
                noResults.style.display = 'none';
            }

            productsToDisplay.forEach(item => {
                // Check if it has a badge or old price to show
                const badgeHTML = item.badge ? `<div class="absolute top-3 left-3 bg-blue-600 text-white text-[10px] font-black px-2 py-1 rounded-md shadow-lg z-10">${item.badge}</div>` : '';
                const oldPriceHTML = item.oldPrice ? `<div class="text-[10px] text-zinc-500 line-through">${formatMoney(item.oldPrice)}</div>` : '';

                const cardHTML = `
                    <div class="hover-card bg-[#111116] border border-zinc-800/80 rounded-2xl p-4 flex flex-col relative overflow-hidden">
                        ${badgeHTML}
                        <div class="bg-zinc-900 rounded-xl h-40 mb-4 overflow-hidden">
                            <img src="${item.img}" alt="${item.name}" class="product-image w-full h-full object-cover opacity-80 hover:opacity-100 transition-opacity">
                        </div>
                        <div class="flex-1">
                            <h3 class="text-sm font-bold text-white mb-1 leading-tight">${item.name}</h3>
                            <p class="text-xs text-zinc-500 mb-3">${item.specs}</p>
                        </div>
                        <div class="flex justify-between items-end border-t border-zinc-800/50 pt-4 mt-auto">
                            <div>
                                ${oldPriceHTML}
                                <div class="text-lg font-black text-blue-400">${formatMoney(item.price)}</div>
                            </div>
                            <button onclick="addToCart(${item.id})" class="bg-zinc-800 hover:bg-blue-600 text-white h-9 w-9 rounded-xl flex items-center justify-center transition-all">
                                <i class="ph-bold ph-plus"></i>
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // 3. Category Filter Logic
        function filterCategory(category) {
            currentFilter = category;
            
            // Update button styles
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.innerText.includes(category)) {
                    btn.classList.remove('bg-zinc-900', 'text-zinc-300', 'border-zinc-800');
                    btn.classList.add('bg-blue-600', 'text-white', 'border-transparent', 'shadow-lg');
                } else {
                    btn.classList.add('bg-zinc-900', 'text-zinc-300', 'border-zinc-800');
                    btn.classList.remove('bg-blue-600', 'text-white', 'border-transparent', 'shadow-lg');
                }
            });

            // Filter database array
            if(category === 'All') {
                renderProducts(database);
            } else {
                const filtered = database.filter(item => item.category === category);
                renderProducts(filtered);
            }
        }

        // 4. Search Bar Logic
        function searchProducts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = database.filter(item => 
                item.name.toLowerCase().includes(query) || 
                item.category.toLowerCase().includes(query)
            );
            
            // Ignore category filter if user is searching
            if(query.length > 0) {
                renderProducts(filtered);
            } else {
                filterCategory(currentFilter); // Revert to active category tab
            }
        }

        // 5. Cart Logic
        let isCartOpen = false;
        function toggleCart() {
            isCartOpen = !isCartOpen;
            document.getElementById('cart-sidebar').classList.toggle('cart-closed', !isCartOpen);
            document.getElementById('cart-sidebar').classList.toggle('cart-open', isCartOpen);
            document.getElementById('overlay').classList.toggle('overlay-closed', !isCartOpen);
            document.getElementById('overlay').classList.toggle('overlay-open', isCartOpen);
        }

        function addToCart(productId) {
            // Find product from database
            const product = database.find(p => p.id === productId);
            cart.push(product);
            updateCartUI();
            if(!isCartOpen) toggleCart();
        }

        function updateCartUI() {
            document.getElementById('cart-counter').innerText = cart.length;
            const emptyMsg = document.getElementById('empty-cart-msg');
            emptyMsg.style.display = cart.length > 0 ? 'none' : 'block';

            const itemsContainer = document.getElementById('cart-items');
            
            const itemsHTML = cart.map((item, index) => `
                <div class="bg-[#111116] border border-zinc-800 rounded-xl p-3 flex justify-between items-center">
                    <div>
                        <h4 class="text-sm font-bold text-white">${item.name}</h4>
                        <p class="text-xs text-blue-400 font-bold">${formatMoney(item.price)}</p>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-zinc-500 hover:text-red-500 p-2"><i class="ph-bold ph-trash"></i></button>
                </div>
            `).join('');
            
            itemsContainer.innerHTML = emptyMsg.outerHTML + itemsHTML;

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total').innerText = formatMoney(total);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        // Initialize Website on first load
        renderProducts(database);

    </script>
</body>
</html>
