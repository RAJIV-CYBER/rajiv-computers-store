<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajiv Computers | The Ultimate Tech Destination</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background-color: #030305; color: #f4f4f5; }
        .glass-panel { background: rgba(10, 10, 15, 0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hover-glow:hover { box-shadow: 0 15px 35px -5px rgba(37, 99, 235, 0.4); border-color: #3b82f6; transform: translateY(-6px); }
        .hidden-section { display: none !important; }
    </style>
</head>
<body>
    <div id="public-storefront">
        <nav class="glass-panel sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                <h1 class="text-2xl font-black text-white">RAJIV <span class="text-blue-500">Computers</span></h1>
                <div class="flex items-center gap-4">
                    <button onclick="showAdminLogin()" class="p-2 text-zinc-500 hover:text-white"><i class="ph-fill ph-terminal-window text-xl"></i></button>
                    <button onclick="toggleCart()" class="bg-zinc-900 px-6 py-2 rounded-full font-bold">Cart</button>
                </div>
            </div>
        </nav>
        
        <section id="product-section" class="max-w-7xl mx-auto px-4 py-16">
            <h2 class="text-3xl font-black mb-10">Featured Hardware</h2>
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>

        <footer class="border-t border-zinc-800 bg-[#020202] pt-20 pb-10">
            <div class="max-w-7xl mx-auto px-4 text-center">
                <p class="text-zinc-500 mb-6">Need help? Reach out to us.</p>
                <!-- YAHAN LINK FIX KAR DIYA HAI -->
                <a href="contact.html" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold">Contact Us</a>
            </div>
        </footer>
    </div>
    
    <!-- Admin Login -->
    <div id="login-modal" class="hidden-section fixed inset-0 bg-black/90 z-[100] flex items-center justify-center">
        <div class="glass-panel p-10 rounded-3xl w-full max-w-md">
            <input type="email" id="admin-user" placeholder="Email" class="w-full bg-black p-3 mb-4 rounded-xl border border-zinc-700 text-white">
            <input type="password" id="admin-pass" placeholder="Password" class="w-full bg-black p-3 mb-6 rounded-xl border border-zinc-700 text-white">
            <button onclick="loginAdmin()" class="w-full bg-blue-600 text-white p-3 rounded-xl">Login</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('rajiv_db_v2')) || [{id: 1, name: "ASUS ROG Strix", category: "Laptop", price: 135000, img: "https://images.unsplash.com/photo-1603302576837-37561b2e2302?auto=format&fit=crop&w=600&q=80", specs: "i7 | RTX 4060"}];
        function renderStorefront(data) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = data.map(item => `
                <div class="glass-panel rounded-3xl p-4">
                    <img src="${item.img}" class="h-40 w-full object-cover rounded-xl mb-4">
                    <h3 class="font-bold">${item.name}</h3>
                    <p class="text-blue-500 font-black">${item.price}</p>
                </div>
            `).join('');
        }
        function showAdminLogin() { document.getElementById('login-modal').classList.remove('hidden-section'); }
        function loginAdmin() {
            if (document.getElementById('admin-user').value === 'admin@rajiv.com' && document.getElementById('admin-pass').value === 'rajiv@123') {
                alert("Logged in! (Admin Dashboard logic here)");
            }
        }
        renderStorefront(db);
    </script>
</body>
</html>
